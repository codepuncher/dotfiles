# yamllint disable-line rule:document-start
name: Lint

# yamllint disable-line rule:truthy
on: push

jobs:
  shell:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Run Shellcheck
        uses: azohra/shell-linter@latest
        with:
          # zsh completion functions (shell/completions) use zsh-only syntax
          # that ShellCheck cannot parse; ShellCheck has no zsh dialect.
          exclude-paths: "shell/completions"

  lua:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run Stylua
        uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          # yamllint disable-line rule:line-length
          args: --quote-style AutoPreferSingle --indent-type Spaces --indent-width 2 --check .
